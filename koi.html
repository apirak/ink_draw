<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>墨の群れ</title>


  <link rel="stylesheet" href="src/styles.css">
</head>
<body data-mode="koi">
<canvas id="bg"></canvas>
<canvas id="trail"></canvas>
<canvas id="main"></canvas>
<div class="grain"></div>
<div class="vignette"></div>

<header class="title" aria-hidden="true">
  <div class="kanji">鯉</div>
</header>

<div class="brush" id="brush"></div>

<aside class="tuner hidden" id="tuner" aria-label="Flocking tuner">
  <h4><span>Flock tuner</span><span class="m" id="tnMode">koi</span></h4>
  <label>Field of view <span class="v" id="vFov"></span></label>
  <input type="range" id="sFov" min="120" max="360" step="5">
  <label>Separation <span class="v" id="vSep"></span></label>
  <input type="range" id="sSep" min="0" max="3" step="0.05">
  <label>Alignment <span class="v" id="vAli"></span></label>
  <input type="range" id="sAli" min="0" max="2" step="0.05">
  <label>Cohesion <span class="v" id="vCoh"></span></label>
  <input type="range" id="sCoh" min="0" max="1.5" step="0.05">
  <div class="foot">FOV = visible arc; 360° sees all, lower carves a rear blind spot. <span class="reset" id="tnReset">reset mode</span></div>
</aside>
  <script src="src/js/setup.js"></script>
  <script type="module" src="src/js/modes-adapter.js"></script>
  <script type="module" src="src/js/agents-adapter.js"></script>
  <script defer src="src/js/pointer.js"></script>
  <script type="module" src="src/js/target-adapter.js"></script>
  <script type="module" src="src/js/effects-adapter.js"></script>
  <script type="module" src="src/js/brush-adapter.js"></script>
  <script defer src="src/js/renderers.js"></script>
  <script defer src="src/js/background.js"></script>
  <script defer src="src/js/physics.js"></script>
  <script defer src="src/js/trail.js"></script>
  <script defer src="src/js/tuner.js"></script>
  <script defer src="src/js/loop.js"></script>
  <script defer src="src/js/koi-main.js"></script>
</body>
</html>
