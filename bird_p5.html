<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>墨の群れ — p5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zhi+Mang+Xing&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/styles.css">
</head>
<body data-mode="birds">
<div id="p5-host"></div>
<div class="grain"></div>
<div class="vignette"></div>

<header class="title" aria-hidden="true">
  <div class="kanji">鸟</div>
</header>

<div class="brush" id="brush"></div>

<aside class="tuner hidden" id="tuner" aria-label="Flocking tuner">
  <h4><span>Flock tuner</span><span class="m" id="tnMode">birds</span></h4>
  <label>Field of view <span class="v" id="vFov"></span></label>
  <input type="range" id="sFov" min="120" max="360" step="5">
  <label>Separation <span class="v" id="vSep"></span></label>
  <input type="range" id="sSep" min="0" max="3" step="0.05">
  <label>Alignment <span class="v" id="vAli"></span></label>
  <input type="range" id="sAli" min="0" max="2" step="0.05">
  <label>Cohesion <span class="v" id="vCoh"></span></label>
  <input type="range" id="sCoh" min="0" max="1.5" step="0.05">
  <label>Count <span class="v" id="vCount"></span></label>
  <input type="range" id="sCount" min="1" max="110" step="1">
  <div class="foot">FOV = visible arc; 360° sees all, lower carves a rear blind spot. <span class="reset" id="tnReset">reset mode</span></div>
</aside>

<aside class="tuner hidden" id="burst-panel" aria-label="Ink burst tuner" style="right:auto;left:28px;">
  <h4><span>Ink burst</span><span class="m">blot</span></h4>
  <label>Color</label>
  <input type="color" id="bColor" value="#32240c">
  <label>Fade time <span class="v" id="bLife-v"></span></label>
  <input type="range" id="bLife" min="60" max="1500" step="20" value="300">
  <div class="foot">Press <b>B</b> to toggle. Color applies to new clicks; fade applies to live blots. <span class="reset" id="bReset">reset</span></div>
</aside>
  <script type="module" src="src/p5/main.ts"></script>
</body>
</html>
